syntax = "proto3";

package engine.common.v1;

import "protoc-gen-openapiv2/options/annotations.proto";
import "engine/common/v1/engine_direct_bill.proto";
import "engine/common/v1/payment_card.proto";

option go_package = "engine.com/engine-partner-api/common/v1";
option java_package = "com.engine.common.v1";
option java_multiple_files = true;

// The payment method used in a request.
// If omitted, the default payment method configured for the caller will be used.
// If no default payment method is configured, an [InvalidPaymentError] error will be returned.
message PaymentInfo {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      title: "Common_PaymentInfo_v1"
    }
  };

  oneof method {
      .engine.common.v1.EngineDirectBill engine_direct_bill = 1;
      .engine.common.v1.PaymentCard payment_card = 2;
  }
}
