syntax = "proto3";

package engine.common.v1;

import "protoc-gen-openapiv2/options/annotations.proto";
import "engine/common/v1/postal_address.proto";

option go_package = "engine.com/engine-partner-api/common/v1";
option java_package = "com.engine.common.v1";
option java_multiple_files = true;

// The payment card that will be charged.
message PaymentCard {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      title: "Common_PaymentCard_v1"
    }
  };

  // The payment card number as a string of digits without any separators or whitespace.
  string number = 1;

  // The card security code, such as CVV or CVC.
  string security_code = 2;

  // The number representing the card’s expiration month (01 through 12). Leading zeroes should be included.
  string expiration_month = 3;

  // Four-digit number representing the card’s expiration year.
  string expiration_year = 4;

  // The billing address associated with the payment card being charged.
  .engine.common.v1.PostalAddress billing_address = 5;
}