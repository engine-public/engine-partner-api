syntax = "proto3";

package engine.book.common.v1;

import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "engine.com/engine-partner-api/book/common/v1";
option java_package = "com.engine.book.common.v1";
option java_multiple_files = true;

// Information about the form of payment used in a request.
message AppliedPaymentInfo {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      title: "Book_Common_AppliedPaymentInfo_v1"
    }
  };

  oneof method {
    AppliedEngineDirectBill engine_direct_bill = 1;
    AppliedCardPayment card = 2;
  }
}

// Indicates that Engine Direct Bill was used.
message AppliedEngineDirectBill {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      title: "Book_Common_AppliedEngineDirectBill_v1"
    }
  };
}

// Indicates a card payment was used.
message AppliedCardPayment {
  option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_schema) = {
    json_schema: {
      title: "Book_Common_AppliedCardPayment_v1"
    }
  };
}